<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frazzetta Family</title>
  <style>
    body {
      margin: 0;
      font-family: Georgia, 'Times New Roman', serif;
      background: #f8f6f1;
      color: #2b2b2b;
      text-align: center;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 80px 25px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    h2 {
      font-size: 22px;
      font-weight: normal;
      margin-bottom: 40px;
      color: #6b5e4a;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
    }

    .contact {
      margin-top: 60px;
      padding: 35px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    button {
      margin-top: 15px;
      padding: 12px 30px;
      font-size: 16px;
      background: #2b2b2b;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #555;
    }

    footer {
      margin-top: 50px;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Frazzetta Family</h1>
    <h2>Mission</h2>

    <p>
      This domain is maintained as the digital home of the Frazzetta Family,
      supporting family communications and preserving a shared online identity
      for current and future generations.
    </p>

    <div class="contact">
      <h2>Contact</h2>

      <form action="mailto:admin@frazzetta.com" method="post" enctype="text/plain">
        <input type="text" name="Name" placeholder="Name" required>
        <input type="email" name="Email" placeholder="Email" required>
        <textarea name="Comment" rows="6" placeholder="Comment" required></textarea>
        <button type="submit">Send</button>
      </form>
    </div>

    <footer>
      © Frazzetta Family
    </footer>
  </div>
</body>
</html>
